            <h2>Registration Form</h2>
        <form method="post">

        <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        
        </div>

        <div class="input-group">
        <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="input-group">
          <label for="birthdate">Birthdate:</label>
            <input type="date" id="birthdate" required>
        </div>

        <div class="input-group">
        <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="input-group">
        <label for="version">Select a version:</label>
            <select id="version" name="version">
                <option disabled selected>--Select a version--</option>
                <option>Pokemon Darkness</option>
                <option>Pokemon Brightness</option>
            </select>
        </div>
        
        <button type="submit" class="submit-btn">Start The New Adventure</button>
